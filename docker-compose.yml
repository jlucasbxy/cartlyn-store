services:
  cartlyn-store-db:
    image: postgres:18.3
    restart: no
    environment:
      POSTGRES_USER: cartlyn
      POSTGRES_PASSWORD: cartlyn123
      POSTGRES_DB: cartlyn_store
    ports:
      - "5432:5432"
    volumes:
      - store_data:/var/lib/postgresql

  redis:
    image: redis:8.6.1-alpine
    restart: no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  store_data:
  redis_data:
