services:
  cartlyn-store-db:
    image: postgres:18.3
    restart: no
    environment:
      POSTGRES_USER: cartlyn
      POSTGRES_PASSWORD: cartlyn123
      POSTGRES_DB: cartlyn_store
    ports:
      - "5432:5432"
    volumes:
      - store_data:/var/lib/postgresql

  redis:
    image: redis:8.6.1-alpine
    restart: no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: no
    environment:
      MP_SMTP_AUTH: "mailpit:mailpit"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  store_data:
  redis_data:
